name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python-checks:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: bash scripts/test.sh

  skill-discovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Discover both skills
        run: |
          output="$(npx -y skills@1.5.9 add . --list)"
          printf '%s\n' "$output"
          grep -q 'patent-bilingual-qa' <<<"$output"
          grep -q 'patent-office-action-response' <<<"$output"
