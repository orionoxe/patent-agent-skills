name: Bug report
description: Report reproducible skill or deterministic-check behavior using synthetic data.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include confidential patent material, client data, credentials, filing identifiers, or deadlines.
  - type: dropdown
    id: skill
    attributes:
      label: Skill
      options:
        - patent-bilingual-qa
        - patent-office-action-response
        - repository tooling
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Include the command, exit code, and sanitized output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: fixture
    attributes:
      label: Minimal synthetic fixture
      description: Provide only invented or fully de-identified text.
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: Public-data confirmation
      options:
        - label: I confirm this report contains no confidential, personal, filing, credential, or deadline data.
          required: true
